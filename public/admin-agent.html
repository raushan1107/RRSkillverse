<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Agent Admin — RR Skillverse</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 80px 24px 48px; }
    .admin-gate { max-width: 420px; margin: 120px auto; background: var(--card-bg, #161b22); border: 1px solid var(--border, #30363d); border-radius: 16px; padding: 40px; text-align: center; }
    .admin-gate h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .admin-gate p { color: var(--muted, #8b949e); font-size: .9rem; margin-bottom: 28px; }
    .admin-gate input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border, #30363d); background: var(--bg, #0d1117); color: var(--text, #e6edf3); font-size: .95rem; margin-bottom: 14px; box-sizing: border-box; }
    .admin-gate input:focus { outline: none; border-color: #58a6ff; }
    .admin-gate button { width: 100%; padding: 10px; border-radius: 8px; background: #58a6ff; color: #0d1117; font-weight: 700; border: none; cursor: pointer; font-size: .95rem; }
    .admin-gate button:hover { background: #79b8ff; }
    .gate-error { color: #f85149; font-size: .85rem; margin-top: 8px; display: none; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: var(--card-bg, #161b22); border: 1px solid var(--border, #30363d); border-radius: 12px; padding: 24px; text-align: center; }
    .stat-val { font-size: 2.2rem; font-weight: 800; color: #58a6ff; line-height: 1; }
    .stat-label { font-size: .8rem; color: var(--muted, #8b949e); margin-top: 8px; text-transform: uppercase; letter-spacing: .05em; }

    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border, #30363d); }
    .tab-btn { padding: 9px 20px; border: none; background: none; color: var(--muted, #8b949e); cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .data-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .data-table th { text-align: left; padding: 10px 12px; background: var(--card-bg, #161b22); color: var(--muted, #8b949e); font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border, #30363d); }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border, #30363d); color: var(--text, #e6edf3); vertical-align: top; }
    .data-table tr:hover td { background: rgba(88,166,255,.04); }
    .data-table .truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-table .mono { font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--muted, #8b949e); }

    .feedback-summary { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .fb-pill { padding: 8px 20px; border-radius: 20px; font-size: .9rem; font-weight: 600; }
    .fb-pill.up { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.3); }
    .fb-pill.down { background: rgba(248,81,73,.15); color: #f85149; border: 1px solid rgba(248,81,73,.3); }
    .fb-pill.sat { background: rgba(88,166,255,.15); color: #58a6ff; border: 1px solid rgba(88,166,255,.3); }

    .rating-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: .85rem; }
    .rating-badge.up { background: rgba(63,185,80,.15); color: #3fb950; }
    .rating-badge.down { background: rgba(248,81,73,.15); color: #f85149; }

    .time-cell { white-space: nowrap; color: var(--muted, #8b949e); font-size: .82rem; }
    .empty-state { text-align: center; padding: 48px; color: var(--muted, #8b949e); }
    .loading-state { text-align: center; padding: 48px; color: var(--muted, #8b949e); }
    .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; }

    .refresh-btn { float: right; padding: 6px 14px; border-radius: 6px; background: var(--card-bg, #161b22); border: 1px solid var(--border, #30363d); color: var(--text, #e6edf3); cursor: pointer; font-size: .85rem; }
    .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>
<div id="navPlaceholder"></div>

<!-- Admin Gate -->
<div id="adminGate" class="admin-gate">
  <div style="font-size:2rem;margin-bottom:12px;">🔐</div>
  <h2>Admin Access</h2>
  <p>Enter the admin secret to access the AI Agent dashboard.</p>
  <input type="password" id="secretInput" placeholder="Admin secret…" autocomplete="off"/>
  <button onclick="tryLogin()">Access Dashboard</button>
  <div class="gate-error" id="gateError">Incorrect secret. Try again.</div>
</div>

<!-- Dashboard -->
<div id="adminDashboard" class="admin-wrap" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
    <div>
      <h1 style="font-size:1.5rem;font-weight:800;margin:0 0 4px;">AI Agent Dashboard</h1>
      <p style="color:var(--muted,#8b949e);margin:0;font-size:.9rem;">Conversations, feedback, and usage stats</p>
    </div>
    <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-val" id="statMessages">—</div><div class="stat-label">Total Messages</div></div>
    <div class="stat-card"><div class="stat-val" id="statUsers">—</div><div class="stat-label">Unique Users</div></div>
    <div class="stat-card"><div class="stat-val" id="statFeedback">—</div><div class="stat-label">Feedback Items</div></div>
    <div class="stat-card"><div class="stat-val" id="statSat">—</div><div class="stat-label">Satisfaction</div></div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('conversations', this)">💬 Conversations</button>
    <button class="tab-btn" onclick="switchTab('feedback', this)">⭐ Feedback</button>
  </div>

  <!-- Conversations tab -->
  <div class="tab-panel active" id="tabConversations">
    <div id="convoContent" class="loading-state">Loading conversations…</div>
  </div>

  <!-- Feedback tab -->
  <div class="tab-panel" id="tabFeedback">
    <div class="feedback-summary" id="fbSummary"></div>
    <div id="feedbackContent" class="loading-state">Loading feedback…</div>
  </div>
</div>

<script src="js/nav.js"></script>
<script>
  let adminSecret = '';

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function tryLogin() {
    const val = document.getElementById('secretInput').value.trim();
    if (!val) return;
    adminSecret = val;
    document.getElementById('gateError').style.display = 'none';
    loadDashboard();
  }

  document.getElementById('secretInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    btn.classList.add('active');
  }

  function formatTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  async function loadDashboard() {
    try {
      const res = await fetch('/api/admin/agent', {
        headers: { 'x-admin-secret': adminSecret }
      });

      if (res.status === 401 || res.status === 403) {
        document.getElementById('gateError').textContent = 'Incorrect secret. Try again.';
        document.getElementById('gateError').style.display = 'block';
        document.getElementById('adminDashboard').style.display = 'none';
        document.getElementById('adminGate').style.display = 'block';
        adminSecret = '';
        return;
      }

      const data = await res.json();

      document.getElementById('adminGate').style.display = 'none';
      document.getElementById('adminDashboard').style.display = 'block';

      const messages = data.messages || [];
      const feedback = data.feedback || [];

      // Stats
      const uniqueUsers = new Set(messages.map(m => m.user_id)).size;
      const upvotes = feedback.filter(f => f.rating === 'up').length;
      const downvotes = feedback.filter(f => f.rating === 'down').length;
      const satPct = feedback.length > 0 ? Math.round((upvotes / feedback.length) * 100) : 0;

      document.getElementById('statMessages').textContent = messages.length;
      document.getElementById('statUsers').textContent = uniqueUsers;
      document.getElementById('statFeedback').textContent = feedback.length;
      document.getElementById('statSat').textContent = feedback.length > 0 ? satPct + '%' : '—';

      // Conversations table
      if (messages.length === 0) {
        document.getElementById('convoContent').innerHTML = '<div class="empty-state">No conversations yet.</div>';
      } else {
        document.getElementById('convoContent').innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Question</th>
                <th>Response</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody>
              ${messages.map(m => `
                <tr>
                  <td class="mono">${escHtml(m.user_name || m.user_id?.slice(0, 8) + '…')}</td>
                  <td><div class="truncate" title="${escHtml(m.user_message)}">${escHtml(m.user_message)}</div></td>
                  <td><div class="truncate" title="${escHtml(m.agent_reply)}">${escHtml(m.agent_reply)}</div></td>
                  <td class="time-cell">${formatTime(m.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }

      // Feedback summary
      document.getElementById('fbSummary').innerHTML = `
        <span class="fb-pill up">👍 ${upvotes} upvotes</span>
        <span class="fb-pill down">👎 ${downvotes} downvotes</span>
        ${feedback.length > 0 ? `<span class="fb-pill sat">${satPct}% satisfaction</span>` : ''}
      `;

      // Feedback table
      if (feedback.length === 0) {
        document.getElementById('feedbackContent').innerHTML = '<div class="empty-state">No feedback yet.</div>';
      } else {
        document.getElementById('feedbackContent').innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th>Rating</th>
                <th>User</th>
                <th>Comment</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody>
              ${feedback.map(f => `
                <tr>
                  <td><span class="rating-badge ${f.rating === 'up' ? 'up' : 'down'}">${f.rating === 'up' ? '👍 Helpful' : '👎 Not helpful'}</span></td>
                  <td class="mono">${escHtml(f.user_id?.slice(0, 8) + '…' || '—')}</td>
                  <td>${escHtml(f.comment) || '<span style="color:var(--muted,#8b949e)">—</span>'}</td>
                  <td class="time-cell">${formatTime(f.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }

    } catch (err) {
      console.error('Dashboard load error:', err);
      document.getElementById('convoContent').innerHTML = '<div class="empty-state">Failed to load data. Check console.</div>';
      document.getElementById('feedbackContent').innerHTML = '<div class="empty-state">Failed to load data.</div>';
    }
  }

  // Auto-login from URL hash: admin-agent.html#admin=SECRET
  (function checkHash() {
    const hash = location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const secret = params.get('admin');
    if (secret) {
      adminSecret = secret;
      history.replaceState(null, '', location.pathname); // clear hash from URL
      loadDashboard();
    }
  })();
</script>
</body>
</html>
