<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a56db" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1a56db"/>
      <stop offset="70%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pill-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56db" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow left -->
  <ellipse cx="200" cy="300" rx="350" ry="300" fill="#1a56db" opacity="0.06"/>
  <!-- Ambient glow right -->
  <ellipse cx="1050" cy="200" rx="280" ry="220" fill="#0ea5e9" opacity="0.05"/>

  <!-- ── LEFT SIDE ── -->

  <!-- RR logo badge -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="url(#logo-grad)"/>
  <text x="112" y="124" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="-0.5">RR</text>

  <!-- RR Skillverse main title -->
  <text x="80" y="240" font-family="Arial,Helvetica,sans-serif" font-size="68" font-weight="800"
        fill="#ffffff" letter-spacing="-2">RR Skillverse</text>

  <!-- by Raushan Ranjan · MCT -->
  <text x="80" y="295" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="400"
        fill="#8b949e">by Raushan Ranjan  ·  Microsoft Certified Trainer</text>

  <!-- Tagline in accent blue -->
  <text x="80" y="358" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="600"
        fill="#58a6ff" letter-spacing="0.5">Azure  ·  Power Platform  ·  .NET  ·  AI</text>

  <!-- Subtitle -->
  <text x="80" y="408" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="400"
        fill="#6e7681">Your complete tech learning platform — built from real enterprise experience</text>

  <!-- ── RIGHT SIDE — Pill badges ── -->

  <!-- Microsoft Certified Trainer -->
  <rect x="820" y="140" width="300" height="48" rx="10" fill="url(#pill-bg)" stroke="#1a56db" stroke-opacity="0.35" stroke-width="1"/>
  <text x="970" y="170" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600"
        fill="#e6edf3" text-anchor="middle">Microsoft Certified Trainer</text>

  <!-- 2900+ Professionals Trained -->
  <rect x="820" y="204" width="300" height="48" rx="10" fill="url(#pill-bg)" stroke="#1a56db" stroke-opacity="0.35" stroke-width="1"/>
  <text x="970" y="234" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600"
        fill="#e6edf3" text-anchor="middle">2900+ Professionals Trained</text>

  <!-- 10+ Years Teaching -->
  <rect x="820" y="268" width="300" height="48" rx="10" fill="url(#pill-bg)" stroke="#1a56db" stroke-opacity="0.35" stroke-width="1"/>
  <text x="970" y="298" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600"
        fill="#e6edf3" text-anchor="middle">10+ Years Teaching</text>

  <!-- 25+ Countries -->
  <rect x="820" y="332" width="300" height="48" rx="10" fill="url(#pill-bg)" stroke="#1a56db" stroke-opacity="0.35" stroke-width="1"/>
  <text x="970" y="362" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600"
        fill="#e6edf3" text-anchor="middle">25+ Countries</text>

  <!-- 38+ Certifications -->
  <rect x="820" y="396" width="300" height="48" rx="10" fill="url(#pill-bg)" stroke="#1a56db" stroke-opacity="0.35" stroke-width="1"/>
  <text x="970" y="426" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="600"
        fill="#e6edf3" text-anchor="middle">38+ Microsoft Certifications</text>

  <!-- ── BOTTOM accent line ── -->
  <rect x="0" y="614" width="1200" height="3" fill="url(#accent-line)" rx="1.5"/>

  <!-- Bottom label -->
  <text x="80" y="608" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="400"
        fill="#6e7681">rr-skillverse.onrender.com</text>
  <text x="1120" y="608" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600"
        fill="#58a6ff" text-anchor="end">Koenig Solutions</text>
</svg>
