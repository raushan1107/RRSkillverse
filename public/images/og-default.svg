<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="630"
     viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="4" y="0" fill="#1a56db"/>
  <rect width="1200" height="4" y="626" fill="#1a56db"/>

  <!-- Logo box -->
  <rect x="80" y="80" width="56" height="56"
        rx="14" fill="#1a56db"/>
  <text x="108" y="120" font-family="Arial"
        font-weight="800" font-size="28"
        fill="white" text-anchor="middle">RR</text>

  <!-- Brand name -->
  <text x="152" y="100" font-family="Arial"
        font-weight="700" font-size="18"
        fill="#e6edf3">RR Skillverse</text>
  <text x="152" y="122" font-family="Arial"
        font-size="13" fill="#7d8590">Learning Platform · Microsoft Certified Trainer</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Arial"
        font-weight="800" font-size="52"
        fill="#e6edf3">Learn with India's MCT</text>
  <text x="80" y="350" font-family="Arial"
        font-weight="700" font-size="36"
        fill="#1a56db">Power BI · Azure · .NET · AI</text>

  <!-- Sub text -->
  <text x="80" y="420" font-family="Arial"
        font-size="20" fill="#7d8590">Enterprise training by Microsoft Certified Trainer</text>
  <text x="80" y="452" font-family="Arial"
        font-size="20" fill="#7d8590">3200+ professionals trained globally</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="Arial"
        font-weight="600" font-size="16"
        fill="#484f58" text-anchor="end">rrskillverse.in</text>

  <!-- Decorative background orbs -->
  <circle cx="1100" cy="100" r="80"
          fill="rgba(26,86,219,0.1)"/>
  <circle cx="1150" cy="200" r="40"
          fill="rgba(26,86,219,0.06)"/>
  <circle cx="1050" cy="520" r="120"
          fill="rgba(14,165,233,0.05)"/>
</svg>
