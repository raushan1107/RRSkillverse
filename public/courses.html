<style>
/* ── Courses hero stats bar ── */
.courses-hero-stats {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 24px;
  max-width: 480px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.courses-hero-stat {
  flex: 1;
  padding: 12px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.courses-hero-stat-num {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.3px;
  line-height: 1;
}
.courses-hero-stat-label {
  font-size: 9px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.courses-hero-stat-div {
  width: 1px;
  height: 32px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── Content area ── */
.courses-content {
  padding: 32px 48px 64px;
  max-width: 1400px;
}

/* ── Filter tabs ── */
.course-filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
}
.course-filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.course-filter-btn:hover {
  border-color: var(--border-md);
  color: var(--text);
}
.course-filter-btn.active {
  background: rgba(26,86,219,0.12);
  border-color: rgba(26,86,219,0.3);
  color: var(--accent);
}
.filter-count {
  font-size: 10px;
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
}

/* ── Course grid ── */
.course-grid-new {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

/* ── Course card ── */
.course-card-new {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.course-card-new::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--brand), var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}
.course-card-new:hover {
  border-color: var(--border-md);
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.35);
}
.course-card-new:hover::before {
  transform: scaleX(1);
}

.course-live {
  border-color: rgba(45,122,79,0.4) !important;
  background: linear-gradient(160deg, rgba(45,122,79,0.06) 0%, var(--bg2) 50%) !important;
  box-shadow: 0 0 0 1px rgba(45,122,79,0.15) inset !important;
}
.course-live::before {
  background: linear-gradient(90deg,#3fb950,#2d7a4f) !important;
  transform: scaleX(1) !important;
}
.course-live .course-title-new {
  color: var(--text) !important;
}
.course-live-badge {
  display: none;
}

.course-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.course-icon { font-size: 22px; line-height: 1; }
.course-sessions-badge {
  font-size: 9px;
  color: var(--text-dim);
  font-family: var(--mono);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
}
.course-short-code {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--accent);
  font-family: var(--mono);
}
.course-title-new {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
}
.course-desc-new {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.65;
  flex: 1;
}
.course-tags-new {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.course-tag-new {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--bg3);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.course-footer-new {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.course-level-badge {
  font-size: 9.5px;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 20px;
  border: 1px solid;
}
.course-cta {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}
.course-card-new:hover .course-cta { opacity: 1; }

@media(max-width:1100px) { .course-grid-new { grid-template-columns: repeat(2,1fr); } }
@media(max-width:900px)  { .courses-content { padding: 24px 20px 48px; } }
@media(max-width:640px) {
  .course-grid-new { grid-template-columns: 1fr; }
  .course-filter-row { gap: 6px; }
  .course-filter-btn { font-size: 11px; padding: 6px 12px; }
  .courses-hero-stats { flex-wrap: wrap; }
  .courses-hero-stat { min-width: 50%; }
  .courses-hero-stat-div { display: none; }
}
</style>

let activeFilter = 'all';

function filterCourses(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.course-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCourses();
}

function renderCourses() {
  const grid = document.getElementById('courseGrid');
  if (!grid) return;

  const filtered = activeFilter === 'all'
    ? COURSES_DATA
    : COURSES_DATA.filter(c => c.cat === activeFilter);

  const sorted = [...filtered].sort((a, b) => {
    if (a.live && !b.live) return -1;
    if (!a.live && b.live) return 1;
    const aSessions = parseInt(a.sessions) || 0;
    const bSessions = parseInt(b.sessions) || 0;
    return bSessions - aSessions;
  });

  if (!sorted.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>No courses in this category yet.</p></div>';
    return;
  }

  const levelColor = {
    'Beginner':           '#2d7a4f',
    'Intermediate':       '#c75c1a',
    'Advanced':           '#7c4b9e',
    'Beginner → Advanced':'#1a56db'
  };

  grid.innerHTML = sorted.map(c => {
    const color = levelColor[c.level] || '#888';
    return `<div class="course-card-new${c.live ? ' course-live' : ''}" onclick="window.location.href='${c.link}'">
      <div class="course-card-header">
        <span class="course-icon">${c.icon}</span>
        <div style="display:flex;align-items:center;gap:6px">
          ${c.live ? `<span style="font-size:9px;font-weight:800;letter-spacing:0.5px;padding:3px 9px;border-radius:20px;background:rgba(45,122,79,0.15);color:#3fb950;border:1px solid rgba(45,122,79,0.3)">● LIVE</span>` : ''}
          <span class="course-sessions-badge">${c.sessions} sessions</span>
        </div>
      </div>
      <div class="course-short-code">${c.short}</div>
      <div class="course-title-new">${c.title}</div>
      <div class="course-desc-new">${c.desc}</div>
      <div class="course-tags-new">
        ${c.tags.slice(0,3).map(t => `<span class="course-tag-new">${t}</span>`).join('')}
      </div>
      <div class="course-footer-new">
        <span class="course-level-badge" style="color:${color};border-color:${color}40;background:${color}12">${c.level}</span>
        <span class="course-cta">${c.live ? 'Open Course →' : 'View Details →'}</span>
      </div>
      ${c.live ? `<div style="margin:6px -22px -22px;padding:8px 22px;background:rgba(45,122,79,0.08);border-top:1px solid rgba(45,122,79,0.15);font-size:10px;font-weight:600;color:#3fb950;display:flex;align-items:center;gap:6px"><span>✓</span>AI-powered lessons · Labs included · Live now</div>` : ''}
    </div>`;
  }).join('');
}

renderCourses();

const urlCat = new URLSearchParams(location.search).get('cat');
if (urlCat) {
  const btn = document.querySelector(`.course-filter-btn[onclick*="'${urlCat}'"]`);
  if (btn) filterCourses(urlCat, btn);
}
