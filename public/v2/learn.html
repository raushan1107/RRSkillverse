<script>
/* ── Course init ─────────────────────────────────────────── */
const _courseId = new URLSearchParams(window.location.search).get('course') || 'default';

function findCourseById(id) {
  if (typeof COURSE_CATALOG === 'undefined') return null;
  if (COURSE_CATALOG[id]) return COURSE_CATALOG[id];
  for (const key of Object.keys(COURSE_CATALOG)) {
    const c = COURSE_CATALOG[key];
    if ((c.id || key) === id || c.slug === id) return c;
  }
  return null;
}

const _courseData = findCourseById(_courseId);

const PHASES = _courseData
  ? _courseData.phases.map(ph => ({
      id:    ph.colorClass,
      label: ph.label,
      title: ph.title,
      lessons: ph.lessons
    }))
  : [];

let ALL = [];
PHASES.forEach((ph, pi) => {
  ph.lessons.forEach((title, li) => {
    ALL.push({ title, phaseIdx: pi, phase: ph, lessonIdx: li, globalIdx: ALL.length });
  });
});

let currentIdx    = -1;
let _currentLesson = null;
let _currentCourse = _courseData;
const _storageKey = 'rrskv_done_' + _courseId;
let done = new Set(JSON.parse(localStorage.getItem(_storageKey) || '[]'));

const LOADING_MSGS = (_courseData && _courseData.loadingMessages)
  ? _courseData.loadingMessages
  : ['Preparing your lesson…', 'Generating content…', 'Loading…'];

/* ── Page title ──────────────────────────────────────────── */
if (_courseData) {
  document.getElementById('pageTitle').textContent = _courseData.title + ' — RR Skillverse';
  document.getElementById('sidebarTitle').textContent = _courseData.subtitle || _courseData.title;
}

/* ── Sidebar ─────────────────────────────────────────────── */
function buildSidebar() {
  const toc = document.getElementById('tocLessons');
  toc.innerHTML = '';
  let gi = 0;
  PHASES.forEach((ph, pi) => {
    const block = document.createElement('div');
    block.className = 'v2-sidebar-phase-block';
    block.id = 'sidebar-phase-' + pi;

    const hdr = document.createElement('div');
    hdr.className = 'v2-sidebar-phase-header';
    hdr.innerHTML = `
      <span class="v2-sidebar-phase-dot v2-phase-dot-${ph.id}"></span>
      <span class="v2-sidebar-phase-label">${ph.label}</span>
      <span class="v2-sidebar-phase-title">${ph.title}</span>
      <span class="v2-sidebar-phase-toggle">▾</span>`;
    hdr.onclick = () => toggleSidebarPhase(pi);
    block.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'v2-sidebar-phase-lessons';
    list.id = 'sidebar-lessons-' + pi;

    ph.lessons.forEach((title, li) => {
      const idx = gi++;
      const el = document.createElement('div');
      el.className = 'v2-sidebar-lesson' + (done.has(idx) ? ' done' : '');
      el.id = 'tl-' + idx;
      el.innerHTML = `
        <span class="v2-sidebar-lesson-num">${String(li + 1).padStart(2, '0')}</span>
        <span class="v2-sidebar-lesson-title">${title}</span>
        <span class="v2-sidebar-lesson-check">✓</span>`;
      el.onclick = () => loadLesson(idx);
      list.appendChild(el);
    });

    block.appendChild(list);
    toc.appendChild(block);
  });

  updateProgress();
  buildPhaseProgress();
}

function toggleSidebarPhase(pi) {
  const list = document.getElementById('sidebar-lessons-' + pi);
  const hdr  = document.querySelector('#sidebar-phase-' + pi + ' .v2-sidebar-phase-header');
  if (!list) return;
  const open = list.style.display !== 'none' && list.style.display !== '';
  list.style.display = open ? 'none' : 'block';
  const toggle = hdr.querySelector('.v2-sidebar-phase-toggle');
  if (toggle) toggle.textContent = open ? '▸' : '▾';
}

function filterSidebarLessons(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.v2-sidebar-lesson').forEach(el => {
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  if (q) {
    document.querySelectorAll('.v2-sidebar-phase-lessons').forEach(el => el.style.display = 'block');
  }
}

/* ── Progress ────────────────────────────────────────────── */
function updateProgress() {
  const fill  = document.getElementById('progressFill');
  const text  = document.getElementById('progressText');
  const total = ALL.length;
  const pct   = total ? Math.round((done.size / total) * 100) : 0;
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = done.size + ' / ' + total + ' lessons';
}

function buildPhaseProgress() {
  const el = document.getElementById('phaseProgress');
  if (!el) return;
  let gi = 0;
  el.innerHTML = PHASES.map((ph, pi) => {
    const start = gi;
    gi += ph.lessons.length;
    const phDone = [...done].filter(i => i >= start && i < gi).length;
    const pct = ph.lessons.length ? Math.round((phDone / ph.lessons.length) * 100) : 0;
    return `<div class="v2-phase-progress-item">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:500;color:var(--ink-2)">${ph.label}</span>
        <span style="color:var(--ink-3)">${phDone}/${ph.lessons.length}</span>
      </div>
      <div style="height:3px;background:var(--surface-3);border-radius:2px">
        <div style="height:3px;background:var(--blue);border-radius:2px;width:${pct}%;transition:width 0.3s"></div>
      </div>
    </div>`;
  }).join('');
}

function saveDone() {
  localStorage.setItem(_storageKey, JSON.stringify([...done]));
  updateProgress();
  buildPhaseProgress();
}

/* ── Navigation ──────────────────────────────────────────── */
function go(dir) {
  const n = currentIdx + dir;
  if (n >= 0 && n < ALL.length) loadLesson(n);
}

function goHome() {
  document.getElementById('lessonView').style.display = 'none';
  document.getElementById('courseHome').style.display = 'block';
  document.getElementById('learnBreadcrumb').style.display = 'none';
  document.getElementById('rightPanelToc').innerHTML = '<li><span style="color:var(--ink-4);font-size:12px">Select a lesson to begin</span></li>';
}

function toggleDone() {
  if (currentIdx < 0) return;
  const btn = document.getElementById('doneBtn');
  if (done.has(currentIdx)) {
    done.delete(currentIdx);
    btn.textContent = 'Mark complete';
    btn.classList.remove('v2-done-active');
    document.getElementById('tl-' + currentIdx)?.classList.remove('done');
  } else {
    done.add(currentIdx);
    btn.textContent = '✓ Completed';
    btn.classList.add('v2-done-active');
    document.getElementById('tl-' + currentIdx)?.classList.add('done');
  }
  saveDone();
}

/* ── Lesson loading ──────────────────────────────────────── */
function loadLesson(idx) {
  currentIdx = idx;
  const lesson = ALL[idx];
  if (!lesson) return;
  _currentLesson = lesson;
  const ph = lesson.phase;

  // Show lesson view
  document.getElementById('courseHome').style.display = 'none';
  document.getElementById('lessonView').style.display = 'block';

  // Breadcrumb
  const bc = document.getElementById('learnBreadcrumb');
  bc.style.display = 'flex';
  document.getElementById('bcPhase').textContent = ph.label + ' · ' + ph.title;
  document.getElementById('bcLesson').textContent = lesson.title;

  // Navigation buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === ALL.length - 1;
  document.getElementById('doneBtn').disabled = false;

  const db = document.getElementById('doneBtn');
  if (done.has(idx)) { db.textContent = '✓ Completed'; db.classList.add('v2-done-active'); }
  else               { db.textContent = 'Mark complete'; db.classList.remove('v2-done-active'); }

  // Active sidebar item
  document.querySelectorAll('.v2-sidebar-lesson').forEach(el => el.classList.remove('active'));
  const active = document.getElementById('tl-' + idx);
  if (active) { active.classList.add('active'); active.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  // Ensure phase is open
  const phaseList = document.getElementById('sidebar-lessons-' + lesson.phaseIdx);
  if (phaseList) phaseList.style.display = 'block';

  // Inject lesson template
  document.getElementById('lessonInner').innerHTML = buildLessonTemplate(lesson, ph);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Right panel headings (will update after content loads)
  document.getElementById('rightPanelToc').innerHTML = '<li><span style="color:var(--ink-4);font-size:12px">Loading…</span></li>';

  // Load AI content
  loadLessonContent(lesson);
}

function buildLessonTemplate(lesson, ph) {
  return `
    <div class="v2-lesson-phase-pill v2-phase-pill-${ph.id}">${ph.label} · ${ph.title}</div>
    <h1 class="v2-lesson-title">${lesson.title}</h1>
    <div class="v2-lesson-meta">
      <span>~8 min read</span>
      <span>·</span>
      <span>RR Simplified · Azure GPT-4o</span>
      <span>·</span>
      <span>MCT Verified</span>
    </div>

    <div class="v2-axiom-promo">
      <div class="v2-axiom-promo-left">
        <div class="v2-axiom-promo-icon">🤖</div>
        <div>
          <div class="v2-axiom-promo-title">Ask Axiom — Your AI Tutor</div>
          <div class="v2-axiom-promo-sub">Got a doubt about this lesson? Get instant, context-aware answers.</div>
        </div>
      </div>
      <button class="v2-btn-primary" onclick="focusAskDoubt()" style="white-space:nowrap;padding:8px 16px;font-size:13px">Ask a Question →</button>
    </div>

    <div class="v2-lesson-body" id="lessonContent">
      <div class="v2-lesson-generating">
        <div class="v2-lesson-spinner"></div>
        <div style="font-weight:600;color:var(--ink-2);margin-bottom:4px">Generating with AI…</div>
        <div style="font-size:13px;color:var(--ink-3)" id="genMsg">Axiom is compiling this lesson using Azure GPT-4o</div>
      </div>
    </div>

    <div class="v2-lesson-verified">
      <span class="v2-verified-badge">✅ MCT Verified</span>
      <span style="font-size:12px;color:var(--ink-3)">Content verified by Raushan Ranjan, Microsoft Certified Trainer</span>
    </div>

    <div class="v2-ask-doubt-section" id="askDoubtSection">
      <div class="v2-ask-doubt-header">
        <div style="font-weight:600;font-size:15px;color:var(--ink)">💬 Ask a Doubt</div>
        <div style="font-size:12px;color:var(--ink-3)">Powered by Axiom AI — trained on Raushan's enterprise course materials</div>
      </div>
      <div class="v2-ask-doubt-input-row">
        <input type="text" id="lessonDoubtInput" class="v2-ask-doubt-input" placeholder="Type your question about this topic…" onkeydown="if(event.key==='Enter')submitDoubt()"/>
        <button class="v2-btn-primary" onclick="submitDoubt()">Ask →</button>
      </div>
      <div class="v2-ask-doubt-response" id="lessonDoubtResponse" style="display:none"></div>
    </div>

    <div class="v2-lesson-footer-strip">
      <button class="v2-lesson-footer-item" onclick="openSupportModal()">☕ Support</button>
      <div class="v2-lesson-footer-div"></div>
      <a class="v2-lesson-footer-item" href="mailto:raushanr1107@gmail.com">✉️ Write to Raushan</a>
    </div>

    <section class="v2-comments-section" id="lessonComments">
      <div style="font-weight:600;font-size:16px;margin-bottom:6px">💬 Discussion</div>
      <div style="font-size:13px;color:var(--ink-3);margin-bottom:16px">Ask questions, share your experience, or help others. Sign in with GitHub to comment.</div>
      <div id="lessonGiscusContainer"></div>
    </section>
  `;
}

/* ── AI content loading ──────────────────────────────────── */
let loadingInterval = null;

async function loadLessonContent(lesson) {
  const contentEl = document.getElementById('lessonContent');
  if (!contentEl) return;

  if (lesson.content && lesson.content.trim().length > 50) {
    contentEl.innerHTML = transformCallouts(lesson.content);
    attachContentHandlers(contentEl);
    updateRightPanelToc(contentEl);
    return;
  }

  // Cycle loading messages
  let msgIdx = 0;
  const genMsg = document.getElementById('genMsg');
  if (loadingInterval) clearInterval(loadingInterval);
  loadingInterval = setInterval(() => {
    if (genMsg) genMsg.textContent = LOADING_MSGS[msgIdx % LOADING_MSGS.length];
    msgIdx++;
  }, 2200);

  try {
    const res = await fetch('/api/lesson', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lessonTitle: lesson.title,
        phaseLabel:  lesson.phase.label,
        phaseTitle:  lesson.phase.title,
        courseId:    _courseId || 'default',
        courseTitle: _courseData ? _courseData.title : 'Intelligent Enterprise Development'
      })
    });

    clearInterval(loadingInterval);
    if (!res.ok) throw new Error('API ' + res.status);

    const data = await res.json();
    if (data.content) {
      contentEl.innerHTML = transformCallouts(data.content);
      attachContentHandlers(contentEl);
      updateRightPanelToc(contentEl);
    } else {
      throw new Error('No content');
    }
  } catch (err) {
    clearInterval(loadingInterval);
    const msg = err.message.includes('429') ? 'Too many requests — please wait and try again.'
      : err.message.includes('401') ? 'Authentication error — please sign in.'
      : 'Check your connection and try again.';
    contentEl.innerHTML = `<div class="v2-lesson-error">
      <div style="font-size:24px;margin-bottom:12px">⚠️</div>
      <div style="font-weight:600;margin-bottom:6px">Could not load this lesson</div>
      <div style="font-size:13px;color:var(--ink-3);margin-bottom:16px">${msg}</div>
      <button class="v2-btn-primary" onclick="loadLessonContent(_currentLesson)">↺ Try Again</button>
    </div>`;
  }
}

function attachContentHandlers(el) {
  el.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
    const pre = block.closest('pre');
    if (!pre.querySelector('.v2-code-header')) {
      const hdr = document.createElement('div');
      hdr.className = 'v2-code-header';
      hdr.innerHTML = '<span class="v2-code-lang">C# · Example</span><button onclick="copyCode(this)">Copy</button>';
      pre.insertBefore(hdr, pre.firstChild);
    }
  });

  el.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', function () {
      const block = this.closest('.quiz-block');
      block.querySelectorAll('.quiz-opt').forEach(b => b.classList.add('reveal'));
      const fb = block.querySelector('.quiz-fb');
      if (this.dataset.correct === 'true') {
        this.classList.add('correct');
        fb.textContent = '✓ Correct — well done!';
        fb.className = 'quiz-fb ok';
      } else {
        this.classList.add('wrong');
        block.querySelector('[data-correct="true"]')?.classList.add('correct');
        fb.textContent = '✗ Not quite — the highlighted option is correct.';
        fb.className = 'quiz-fb fail';
      }
    });
  });
}

function transformCallouts(html) {
  return html
    .replace(/<analogy>([\s\S]*?)<\/analogy>/g, '<div class="v2-callout v2-callout-analogy"><div class="v2-callout-label">Analogy</div><p>$1</p></div>')
    .replace(/<tip>([\s\S]*?)<\/tip>/g,         '<div class="v2-callout v2-callout-tip"><div class="v2-callout-label">Trainer Tip</div><p>$1</p></div>')
    .replace(/<warn>([\s\S]*?)<\/warn>/g,        '<div class="v2-callout v2-callout-warn"><div class="v2-callout-label">Watch Out</div><p>$1</p></div>');
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code');
  if (code) navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 1600);
  });
}

function updateRightPanelToc(contentEl) {
  const headings = contentEl.querySelectorAll('h2, h3');
  const toc = document.getElementById('rightPanelToc');
  if (!toc) return;
  if (!headings.length) { toc.innerHTML = '<li><span style="color:var(--ink-4);font-size:12px">No headings found</span></li>'; return; }
  toc.innerHTML = [...headings].map((h, i) => {
    const id = 'h-' + i;
    h.id = id;
    const indent = h.tagName === 'H3' ? 'margin-left:12px;' : '';
    return `<li><a href="#${id}" style="${indent}font-size:12px;color:var(--ink-3);display:block;padding:2px 0;transition:color 0.15s" onmouseover="this.style.color='var(--blue)'" onmouseout="this.style.color='var(--ink-3)'">${h.textContent}</a></li>`;
  }).join('');
}

/* ── Doubt submission ────────────────────────────────────── */
function focusAskDoubt() {
  const input = document.getElementById('lessonDoubtInput');
  if (input) { input.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(() => input.focus(), 400); }
}

async function submitDoubt() {
  const input = document.getElementById('lessonDoubtInput');
  const responseEl = document.getElementById('lessonDoubtResponse');
  if (!input || !responseEl) return;
  const q = input.value.trim();
  if (!q) return;

  responseEl.style.display = 'block';
  responseEl.innerHTML = '<div style="padding:12px;color:var(--ink-3);font-size:13px">🤖 Axiom is thinking…</div>';

  try {
    const res = await fetch('/api/doubt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question:    q,
        lessonTitle: _currentLesson ? _currentLesson.title : '',
        courseId:    _courseId || 'default',
        courseTitle: _currentCourse ? _currentCourse.title : ''
      })
    });
    const data = await res.json();
    responseEl.innerHTML = `<div class="v2-doubt-response">${data.answer || data.reply || 'No answer received.'}</div>`;
  } catch (err) {
    responseEl.innerHTML = `<div style="padding:12px;color:var(--ink-3);font-size:13px">Could not reach Axiom — please check your connection.</div>`;
  }
}

/* ── Course intro page ───────────────────────────────────── */
function buildCourseIntroPage() {
  const home = document.getElementById('courseHome');
  if (!home) return;

  if (!_courseData) {
    home.innerHTML = `<div style="padding:48px 32px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">🚧</div>
      <h2 style="margin-bottom:8px">Course Not Found</h2>
      <p style="color:var(--ink-3);margin-bottom:20px">The course "<code>${_courseId}</code>" is not available yet.</p>
      <a href="/v2/courses.html" class="v2-btn-primary">← Browse All Courses</a>
    </div>`;
    return;
  }

  const course = _courseData;
  const totalLessons = ALL.length;
  let gIdx = 0;

  const phasesHTML = (course.phases || []).map((ph, i) => {
    const items = (ph.lessons || []).map((title, j) => {
      const idx = gIdx++;
      return `<div class="v2-cip-lesson" onclick="loadLesson(${idx})">
        <span class="v2-cip-num">${String(j+1).padStart(2,'0')}</span>
        <span class="v2-cip-title">${title}</span>
        <span class="v2-cip-time">~8 min</span>
      </div>`;
    }).join('');
    return `<div class="v2-cip-phase">
      <div class="v2-cip-phase-header" onclick="toggleIntroPhase(${i})">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="v2-phase-dot-${ph.colorClass}" style="width:10px;height:10px;border-radius:50%;background:var(--dot-${ph.colorClass},var(--blue));flex-shrink:0;display:inline-block"></span>
          <span style="font-weight:600;color:var(--ink)">${ph.label}</span>
          <span style="color:var(--ink-3)">${ph.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--ink-4)">${(ph.lessons||[]).length} lessons</span>
          <span class="v2-cip-chev" id="cip-chev-${i}">▸</span>
        </div>
      </div>
      <div class="v2-cip-lessons" id="cip-lessons-${i}" style="display:none">${items}</div>
    </div>`;
  }).join('');

  home.innerHTML = `
    <div class="v2-course-intro">
      <div class="v2-course-intro-header">
        <a href="/v2/courses.html" class="v2-course-intro-back">← Back to Library</a>
        <div class="v2-course-intro-category">${course.category || 'Course'}</div>
        <h1 class="v2-course-intro-title">${course.title}</h1>
        <p class="v2-course-intro-desc">${course.description || ''}</p>
        <div class="v2-course-intro-pills">
          <span class="v2-cim-pill">📚 ${totalLessons} lessons</span>
          <span class="v2-cim-pill">🗂️ ${(course.phases||[]).length} phases</span>
          <span class="v2-cim-pill">🤖 Axiom AI included</span>
          <span class="v2-live-badge">LIVE</span>
        </div>
        <button class="v2-btn-primary" onclick="loadLesson(0)" style="padding:12px 28px;font-size:15px;margin-top:8px">Start Learning →</button>
      </div>
      <div class="v2-course-features">
        <div class="v2-feature-card"><div class="v2-feature-icon">🤖</div><div class="v2-feature-title">Axiom AI Tutor</div><div class="v2-feature-desc">Ask any doubt mid-lesson. Instant answers in Raushan's teaching style.</div></div>
        <div class="v2-feature-card"><div class="v2-feature-icon">📝</div><div class="v2-feature-title">AI-Generated Notes</div><div class="v2-feature-desc">Every lesson generated fresh with Azure GPT-4o — simplified, practical, enterprise-grade.</div></div>
        <div class="v2-feature-card"><div class="v2-feature-icon">🧪</div><div class="v2-feature-title">Hands-on Labs</div><div class="v2-feature-desc">Real exercises with Azure, Power BI, and .NET. Build while you learn.</div></div>
      </div>
      <div class="v2-course-curriculum">
        <div class="v2-curriculum-title">Course Curriculum</div>
        ${phasesHTML}
      </div>
    </div>`;
}

function toggleIntroPhase(i) {
  const body = document.getElementById('cip-lessons-' + i);
  const chev = document.getElementById('cip-chev-' + i);
  if (!body) return;
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▸' : '▾';
}
