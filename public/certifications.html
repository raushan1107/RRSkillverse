<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certifications — RR Skillverse</title>
<link rel="stylesheet" href="css/main.css"/>
<style>
.cert-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
.filter-btn {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border);
  background:var(--bg3); color:var(--text-muted); font-size:11px;
  font-weight:600; cursor:pointer; transition:all 0.15s; font-family:var(--font);
}
.filter-btn:hover { border-color:var(--border-hover); color:var(--text); }
.filter-btn.active { background:var(--brand); border-color:var(--brand); color:#fff; }

.certs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px; }
.cert-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px 22px;
  position:relative; overflow:hidden;
  transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  display:flex; flex-direction:column; gap:8px;
}
.cert-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2.5px;
  transform:scaleX(0); transform-origin:left; transition:transform 0.35s;
}
.cert-card.msft::after  { background:linear-gradient(90deg,#0078d4,#00bcf2); }
.cert-card.cisco::after { background:linear-gradient(90deg,#1ba0d7,#005073); }
.cert-card.google::after { background:linear-gradient(90deg,#4285f4,#34a853); }
.cert-card.coursera::after { background:linear-gradient(90deg,#0056d3,#00b0ff); }
.cert-card.other::after { background:linear-gradient(90deg,var(--brand),var(--accent)); }
.cert-card:hover { border-color:var(--border-md); transform:translateY(-3px); box-shadow:var(--sh2); }
.cert-card:hover::after { transform:scaleX(1); }
.cert-org { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--accent); }
.cert-name { font-size:14px; font-weight:700; color:var(--text); line-height:1.3; }
.cert-id   { font-size:9px; color:var(--text-dim); font-family:var(--mono); }
.cert-date { font-size:10px; color:var(--text-muted); }
.cert-footer { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }

.page-info { font-size:12px; color:var(--text-muted); text-align:center; margin-top:16px; }

.cert-search {
  width:100%; max-width:380px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:9px 14px;
  color:var(--text); font-family:var(--font); font-size:13px;
  outline:none; transition:border-color 0.2s;
}
.cert-search:focus { border-color:rgba(26,86,219,0.4); box-shadow:0 0 0 3px rgba(26,86,219,0.07); }
.cert-search::placeholder { color:var(--text-dim); }

.cert-top-bar { display:flex; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; justify-content:space-between; }
.cert-count { font-size:12px; color:var(--text-muted); }
</style>
</head>
<body>
<script src="js/nav.js"></script>
<div class="page-body">
  <div class="page-hero">
    <div class="page-hero-eyebrow">02 — Credentials</div>
    <h1>Microsoft Certified<br/>and <em>beyond.</em></h1>
    <p>38+ active certifications across Azure, Power Platform, .NET, Networking, AI and more. Curated from real enterprise training delivery.</p>
  </div>

  <div class="page-content-wide">
    <div class="cert-top-bar">
      <input type="text" class="cert-search" id="certSearch" placeholder="Search certifications…" oninput="filterCerts()"/>
      <div class="cert-count" id="certCount"></div>
    </div>
    <div class="cert-filters" id="certFilters">
      <button class="filter-btn active" onclick="filterByOrg('all',this)">All</button>
      <button class="filter-btn" onclick="filterByOrg('microsoft',this)">Microsoft</button>
      <button class="filter-btn" onclick="filterByOrg('cisco',this)">Cisco</button>
      <button class="filter-btn" onclick="filterByOrg('google',this)">Google</button>
      <button class="filter-btn" onclick="filterByOrg('coursera',this)">Coursera</button>
      <button class="filter-btn" onclick="filterByOrg('other',this)">Other</button>
    </div>
    <div class="certs-grid" id="certsGrid"></div>
    <div class="pagination" id="pagination"></div>
    <div class="page-info" id="pageInfo"></div>
  </div>
</div>
<script src="js/main.js"></script>
<script>
const ALL_CERTS = [
  {org:'Microsoft',cls:'msft',name:'Azure Developer Associate',id:'A6F3AAB5E62B844',date:'Apr 2025',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Power Platform Fundamentals (PL-900)',id:'885AA13395F9C405',date:'Mar 2025',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Power Platform Developer Associate (PL-400)',id:'AF5C5C21C9C2B2A8',date:'Aug 2024',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Power BI Data Analyst Associate (PL-300)',id:'Expires Aug 2027',date:'Aug 2023',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Microsoft Certified Trainer (MCT)',id:'Annual Renewal',date:'Aug 2023',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Azure Fundamentals (AZ-900)',id:'AA4887DA0DA33947',date:'Mar 2023',status:'active'},
  {org:'Microsoft / Koenig',cls:'msft',name:'Azure Administrator (AZ-104)',id:'—',date:'Jul 2022',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Azure AI Fundamentals (AI-900)',id:'—',date:'2023',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Power Automate Fundamentals',id:'—',date:'2024',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Dynamics 365 Fundamentals (MB-900)',id:'—',date:'2024',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Security, Compliance & Identity Fundamentals (SC-900)',id:'—',date:'2023',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Modern Work Fundamentals (MS-900)',id:'—',date:'2023',status:'active'},
  {org:'Cisco',cls:'cisco',name:'CCNA: Introduction to Networks',id:'Letter of Merit',date:'May 2022',status:'active'},
  {org:'Cisco',cls:'cisco',name:'CCNA: Switching, Routing, and Wireless Essentials',id:'—',date:'2022',status:'active'},
  {org:'Cisco',cls:'cisco',name:'PCAP: Python Programming Essentials',id:'—',date:'Feb 2022',status:'active'},
  {org:'Cisco',cls:'cisco',name:'Networking Basics',id:'—',date:'2021',status:'active'},
  {org:'Coursera · Google',cls:'google',name:'Crash Course on Python by Google',id:'—',date:'Nov 2021',status:'active'},
  {org:'Coursera · Google',cls:'google',name:'Using Python to Interact with the OS',id:'—',date:'2022',status:'active'},
  {org:'Coursera · DeepLearning.AI',cls:'coursera',name:'ML Pipelines with Azure ML Studio',id:'5GLKC5HLRJJT',date:'Sep 2022',status:'active'},
  {org:'Coursera',cls:'coursera',name:'Neural Networks and Deep Learning',id:'—',date:'2022',status:'active'},
  {org:'Coursera · IBM',cls:'coursera',name:'Python for Data Science, AI & Development',id:'—',date:'2022',status:'active'},
  {org:'Koenig Solutions',cls:'other',name:'VMware vSphere: Install, Configure, Manage',id:'—',date:'Jul 2022',status:'active'},
  {org:'Koenig Solutions',cls:'other',name:'Microsoft Azure Infrastructure Solutions',id:'—',date:'2022',status:'active'},
  {org:'HackerRank',cls:'other',name:'Python (Basic)',id:'—',date:'2021',status:'active'},
  {org:'HackerRank',cls:'other',name:'Python (Intermediate)',id:'—',date:'2022',status:'active'},
  {org:'HackerRank',cls:'other',name:'SQL (Basic)',id:'—',date:'2022',status:'active'},
  {org:'HackerRank',cls:'other',name:'Problem Solving (Basic)',id:'—',date:'2022',status:'active'},
  {org:'NPTEL',cls:'other',name:'Programming in Java',id:'—',date:'2021',status:'active'},
  {org:'NPTEL',cls:'other',name:'Data Structures and Algorithms',id:'—',date:'2021',status:'active'},
  {org:'Udemy',cls:'other',name:'Complete Web Development Bootcamp',id:'—',date:'2021',status:'active'},
  {org:'LinkedIn Learning',cls:'other',name:'ASP.NET Core Essential Training',id:'—',date:'2022',status:'active'},
  {org:'LinkedIn Learning',cls:'other',name:'Entity Framework Core',id:'—',date:'2022',status:'active'},
  {org:'Microsoft Learn',cls:'msft',name:'Applied Skills: Create and manage automated processes (PL-400)',id:'—',date:'2024',status:'active'},
  {org:'Microsoft',cls:'msft',name:'Azure Cosmos DB Developer Specialty (DP-420) — In Progress',id:'—',date:'2025',status:'progress'},
  {org:'Microsoft',cls:'msft',name:'Azure Solutions Architect Expert (AZ-305) — In Progress',id:'—',date:'2025',status:'progress'},
];

const PER_PAGE = 12;
let currentOrg = 'all';
let currentPage = 1;
let filtered = [...ALL_CERTS];

function filterByOrg(org, btn) {
  currentOrg = org;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilter();
}

function filterCerts() {
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('certSearch').value.toLowerCase();
  filtered = ALL_CERTS.filter(c => {
    const orgMatch = currentOrg === 'all' || c.cls === currentOrg;
    const qMatch   = !q || c.name.toLowerCase().includes(q) || c.org.toLowerCase().includes(q);
    return orgMatch && qMatch;
  });
  renderPage();
}

function renderPage() {
  const grid = document.getElementById('certsGrid');
  const start = (currentPage - 1) * PER_PAGE;
  const end   = start + PER_PAGE;
  const page  = filtered.slice(start, end);

  grid.innerHTML = page.map(c => `
    <div class="cert-card ${c.cls}" data-reveal="scale">
      <div class="cert-org">${c.org}</div>
      <div class="cert-name">${c.name}</div>
      ${c.id !== '—' ? `<div class="cert-id">ID: ${c.id}</div>` : ''}
      <div class="cert-date">${c.date}</div>
      <div class="cert-footer">
        <span class="badge ${c.status === 'active' ? 'badge-green' : 'badge-amber'}">${c.status === 'active' ? '✓ Active' : '⏳ In Progress'}</span>
      </div>
    </div>`).join('');

  document.getElementById('certCount').textContent = `Showing ${start+1}–${Math.min(end,filtered.length)} of ${filtered.length}`;
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - currentPage) <= 2) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 3) {
      html += `<span class="page-btn" style="pointer-events:none;opacity:0.4">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  el.innerHTML = html;
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${total}`;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

applyFilter();
</script>
</body>
</html>
